<header>
  <app-page-title />
</header>
<mat-nav-list>
  @for (option of navOptions; track option.path) {
    <a mat-list-item [activated]="activeLink() === option.path" [routerLink]="option.path">
      <mat-icon matListItemIcon>{{ option.icon }}</mat-icon>
      {{ option.title }}
    </a>
  }
</mat-nav-list>
<footer>
  <app-theme-toggle [titleDisplay]="'start'" />
</footer>
